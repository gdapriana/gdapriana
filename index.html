<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- AOS css -->
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

    <!-- style css -->
    <link rel="stylesheet" href="css/laptop.css">
    <link rel="stylesheet" href="css/tablet.css">
    <link rel="stylesheet" href="css/desktop.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/tv.css">

    <!-- Boxicon CSS -->
    <link href='https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css' rel='stylesheet'>


</head>
<body>

    <!-- ! container -->

    <div class="container" id="container">

        <!-- *Header -->
        <section class="header" id="header">
            <!-- Image Header -->
            <div class="header-image" id="header-image"></div>
            <!-- Profile Bar -->
            <div class="profile-bar" id="profile-bar">
                <!-- Profile Image -->
                <div class="profile-image" id="profile-image"></div>

                <!-- profile name, desc name, and sub profile -->
                <div class="name-profile" id="name-profile">
                    I Komang Gede Apriana
                </div>

                <div class="desc-profile" id="desc-profile">
                    Udayana Computer Science 21
                </div>

                <div class="sub-profile" id="sub-profile">
                    <div class="dots sub-header" id="dots">
                        <a href="#">
                            <i class='bx bx-dots-horizontal-rounded'></i>
                        </a>
                    </div>

                    <div class="about-header sub-header" id="about-header">
                        <a href="#">
                            About <i class='bx bxs-user-rectangle'></i>
                        </a>
                    </div>

                    <div class="experience-header sub-header" id="experience-header">
                        <a href="#">
                            Experience <i class='bx bxl-stack-overflow'></i>
                        </a>
                    </div>

                    <div class="project-header sub-header" id="project-header">
                        <a href="#">
                            Project <i class='bx bx-desktop' ></i>
                        </a>
                    </div>

                    <div class="skills-header sub-header" id="skills-header">
                        <a href="#">
                            Skills <i class='bx bx-stats'></i>
                        </a>
                    </div>

                    <div class="contact-header sub-header" id="contact-header">
                        <a href="#">
                            Contact <i class='bx bxs-contact' ></i>
                        </a>
                    </div>
                </div>
            </div>
            <!-- divider -->
            <div class="line" id="line">
                
            </div>
        </section>

        <!-- *Header End -->

        <!-- About -->
        <section class="about" id="about"></section>
        <!-- About End -->

        <!-- Experience -->
        <section class="experience" id="experience"></section>
        <!-- Experience End -->

        <!-- Project -->
        <section class="project" id="project"></section>
        <!-- Project End -->

        <!-- Skills -->
        <section class="skills" id="skills"></section>
        <!-- Skills End -->

        <!-- Study -->
        <section class="study" id="study"></section>
        <!-- Study End -->

        <!-- Contact -->
        <section class="contact" id="contact"></section>
        <!-- End Contact -->

    </div>

    <!-- container end -->
    






    <!-- main javascript -->
    <script src="js/script.js"></script>

    <!--AOS Javascript -->
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
</body>
</html>
